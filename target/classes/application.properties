# ==============================
# Application
# ==============================
spring.application.name=MicroLend
server.port=8082

# ==============================
# Database - MySQL
# ==============================

# ✅ FIXED: replaced '&amp;' → '&' (VERY IMPORTANT)
spring.datasource.url=jdbc:mysql://localhost:3306/microlend?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC

spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================
# JPA / Hibernate
# ==============================

# ✅ KEEP: correct dialect for MySQL 8
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ✅ CHANGE: use 'update' instead of create-drop (prevents repeated drop/create issues)
spring.jpa.hibernate.ddl-auto=update

# ✅ KEEP: SQL logging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ✅ ADDED: helps Hibernate generate proper SQL for MySQL
spring.jpa.properties.hibernate.dialect.storage_engine=innodb

# ✅ OPTIONAL: safer SQL generation behavior
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ==============================
# JWT
# ==============================
app.jwt.secret=MicroLendSuperSecretKeyForJWTTokenGenerationAndValidation2024SecureKey
app.jwt.expiration=86400000

# ==============================
# Logging
# ==============================
logging.level.com.microlend=DEBUG
logging.level.org.springframework.security=DEBUG
# Spring Scheduling
spring.task.scheduling.pool.size=5

# ==============================
# Swagger / OpenAPI
# ==============================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.displayRequestDuration=true
